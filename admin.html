<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Intake Upload Portal</title><style>
:root{--bg:#fff5f8;--card:#fffafe;--ink:#2b1720;--muted:#7b5b68;--line:#f2c8d8;--line2:#f6dbe5;--accent:#b8326f;--accent-dark:#87244f;--accent2:#ffe2ed}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#ffe3ee 0,#fff5f8 34%,#fff 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);line-height:1.45}
.wrap{max-width:940px;margin:0 auto;padding:16px 14px 90px}header{position:sticky;top:0;z-index:20;background:rgba(255,245,248,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:16px 14px 12px;margin:0 -14px 14px;box-shadow:0 10px 30px rgba(184,50,111,.08)}
h1{font-size:25px;margin:0 0 4px}.sub{color:var(--muted);font-size:13px}.grid{display:grid;gap:12px}.case-card,section{background:rgba(255,250,254,.98);border:1px solid var(--line);border-radius:24px;padding:15px;box-shadow:0 10px 28px rgba(184,50,111,.08)}
.case-card{position:relative;overflow:hidden}.case-card:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,#ff9cc4,#b8326f,#ffd6e6)}.case-card h2{margin:3px 0 6px;font-size:19px}.meta{font-size:13px;color:var(--muted);display:grid;gap:2px}.meta b{color:#5b3343}
button,.btn{border:0;border-radius:999px;padding:12px 15px;font-weight:850;background:linear-gradient(135deg,var(--accent),#d85892);color:white;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;box-shadow:0 8px 18px rgba(184,50,111,.18)}button.secondary,.btn.secondary{background:#fff;color:var(--accent-dark);border:1px solid var(--line);box-shadow:none}.toolbar{display:flex;gap:8px;margin-top:10px;overflow:auto}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 0}.chip{font-size:12px;padding:6px 9px;border-radius:999px;background:var(--accent2);color:var(--accent-dark);font-weight:800;border:1px solid #f7bfd4}.chip.docs{background:#f1e8ff;color:#5f367f;border-color:#e1ccff}.chip.value{background:#ffeef5;color:#9a255b;border-color:#ffc5dc}.chip.red{background:#fff0c7;color:#7b5200;border-color:#ffd96a}
.detail{display:none}.detail.active{display:block}h2{font-size:22px;margin:0 0 8px}h3{margin:0 0 10px;font-size:17px;color:#6e1644}.kv{display:grid;grid-template-columns:115px 1fr;gap:8px;font-size:14px;border-top:1px solid var(--line2);padding-top:10px}.kv b{color:var(--muted)}
.textblock{white-space:pre-wrap;background:#fff;border:1px solid var(--line2);border-radius:18px;padding:13px;max-height:430px;overflow:auto;font-size:14px}details{border:1px solid var(--line2);border-radius:18px;padding:11px;margin:8px 0;background:#fff}summary{font-weight:900;cursor:pointer;color:#5d2440}
label{display:block;font-size:13px;font-weight:900;margin:12px 0 6px;color:#5d2440}textarea,input,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:18px;padding:13px;background:#fff;color:var(--ink)}textarea{min-height:118px}
.radio-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.radio-row label{margin:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:18px;padding:11px;background:#fff;font-size:14px}input[type=radio],input[type=checkbox]{width:auto;margin-right:6px}
.notice,.empty{background:#fff1f6;border:1px solid var(--line);padding:16px;border-radius:22px;color:#6e1644;text-align:center}.empty{padding:34px 18px}.status{font-size:14px;font-weight:800;color:var(--accent-dark);margin-top:10px}.toggle{display:flex;align-items:center;gap:10px}.toggle input{width:auto}.hide{display:none!important}.referral-card{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff,#fff3f8)}
.progress-pill{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--accent-dark);font-size:12px;font-weight:900}.footer-actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(255,245,248,0),rgba(255,245,248,.98) 28%);padding:18px 0 4px;margin-bottom:-6px}.mini{font-size:12px;color:var(--muted)}
.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(43,23,32,.38);backdrop-filter:blur(7px)}.celebration.hidden{display:none}.celebration-card{width:min(520px,92vw);background:linear-gradient(180deg,#fffafe,#fff0f6);border:1px solid var(--line);border-radius:30px;padding:26px 20px;text-align:center;box-shadow:0 28px 80px rgba(184,50,111,.28);position:relative;overflow:hidden}.celebration-card:before{content:"";position:absolute;inset:0 0 auto 0;height:9px;background:linear-gradient(90deg,#ff9cc4,#b8326f,#ffd6e6,#ffb7d1)}.celebration-icon{font-size:48px}.confetti-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none}.confetti{position:absolute;top:-20px;width:9px;height:14px;border-radius:3px;animation:confettiFall linear forwards}@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:1}}
.drop{border:2px dashed #e6aac2;border-radius:22px;padding:22px;text-align:center;background:#fff7fb;color:#6e1644}.drop.drag{background:#ffe8f2;border-color:var(--accent)}.file-list{font-size:13px;color:var(--muted);margin-top:10px}
@media(max-width:560px){.wrap{padding:12px 10px 90px}header{margin:0 -10px 12px;padding:14px 10px 11px}h1{font-size:22px}.case-card,section{border-radius:22px}.radio-row{grid-template-columns:1fr}.kv{grid-template-columns:96px 1fr}.textblock{max-height:360px}.footer-actions button{width:100%;justify-content:center}}
</style></head><body><div class="wrap"><header><h1>Intake Upload Portal</h1><div class="sub">Upload new attorney-review items for Heather. Tiny pink conveyor belt of justice.</div></header><section><form id="caseForm" onsubmit="submitCase(event)"><label>PNC / Client Name *</label><input required name="name"><label>Practice Area</label><input name="practice"><label>Estimated Value</label><input name="value"><label>Adverse Party/Parties</label><input name="adverse"><label>Email</label><input name="email"><label>Phone</label><input name="phone"><label>Submitted / Intake Completed Date</label><input name="submitted" placeholder="06/18/2026 10:52am EDT"><label>Special Tag</label><input name="specialTag" placeholder="Red Flag Check / Demand Letter / Time Sensitive"><label>Attorney-Facing Summary *</label><textarea required name="summary"></textarea><label>Full Intake Form Contents</label><textarea name="fullText"></textarea><label>Intake Form PDF / DOC</label><div id="intakeDrop" class="drop">Drag intake form here or tap to choose<input id="intakeFile" type="file" hidden></div><div id="intakeList" class="file-list"></div><label>Related Docs</label><div id="docsDrop" class="drop">Drag related docs here or tap to choose<input id="docFiles" type="file" multiple hidden></div><div id="docsList" class="file-list"></div><br><button type="submit">Upload to Heather’s Queue 💕</button><div id="status" class="status"></div></form></section></div><script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyuN-_mt09m-3rMNnlQU-rkCtoPod-HrWkfURN169pcA75UvFYnvalFn7nRnboAkUPV/exec";let intakeFile=null,docFiles=[];const $=id=>document.getElementById(id);
function fileToBase64(file){return new Promise((resolve,reject)=>{let r=new FileReader();r.onload=()=>resolve({name:file.name,type:file.type,data:String(r.result).split(",")[1]});r.onerror=reject;r.readAsDataURL(file);});}
function setupDrop(zoneId,inputId,mode){let z=$(zoneId),i=$(inputId);z.onclick=()=>i.click();z.ondragover=e=>{e.preventDefault();z.classList.add("drag")};z.ondragleave=()=>z.classList.remove("drag");z.ondrop=e=>{e.preventDefault();z.classList.remove("drag");handleFiles([...e.dataTransfer.files],mode)};i.onchange=()=>handleFiles([...i.files],mode);}
function handleFiles(files,mode){if(mode==="intake"){intakeFile=files[0]||null;$("intakeList").textContent=intakeFile?intakeFile.name:"";}else{docFiles=files;$("docsList").innerHTML=docFiles.map(f=>"• "+f.name).join("<br>");}}
setupDrop("intakeDrop","intakeFile","intake");setupDrop("docsDrop","docFiles","docs");
async function api(action,payload){let res=await fetch(SCRIPT_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...payload})});return await res.json();}
async function submitCase(e){e.preventDefault();$("status").textContent="Uploading…";let form=new FormData(e.target),payload=Object.fromEntries(form.entries());payload.intakeFile=intakeFile?await fileToBase64(intakeFile):null;payload.docs=[];for(const f of docFiles)payload.docs.push(await fileToBase64(f));try{await api("addCase",payload);$("status").textContent="Uploaded! It should now appear in Heather’s queue.";e.target.reset();intakeFile=null;docFiles=[];$("intakeList").textContent="";$("docsList").textContent="";}catch(err){$("status").textContent="Upload failed. Check Apps Script permissions/deployment.";}}
</script></body></html>
