ry concern remains the fence encroachment rather than the code issues. Mr. Bartolone…", "fullText": "1 of 2\n\nIntake Form\nSubmitted on: 06/17/2026 11:29am EDT • Form Type: Matter\n\n\n                                            Lead Type      Phone\n\n                                            First name     Joe & Nancy\n\n                                            Last name      Bartolone\n\n                                                Gender     Male\n\n                                     Email (Primary)       jbusc@bellsouth.net\n\n                                    Phone (Primary)        (609) 226-2614\n\n                              Referral Source Type         Intake team\n\n                             Adverse Party/Parties         Horse Branch Farms, LLC | Frank & Naomi Kurzweg\n\n                        Do you have a company?             No\n\n                How did you find out about us?             Website Pool\n\n                              Second Source Type           AI / ChatGPT\n\n                                        Practice Area      Real Estate\n\n                                                                                                                                                 2 of 2\n\n                                           I spoke with Joseph Bartolone, Jr. regarding a post-judgment property line and encroachment\n                                           dispute involving his property and neighboring property owned by Horse Branch Farms, LLC in\n                                           Morgan County, Georgia. Mr. Bartolone advised that he and his wife, Nancy Bartolone, were\n                                           defendants in prior litigation initiated by Horse Branch Farms, LLC concerning the location of\n                                           the common boundary line. According to Mr. Bartolone, the matter proceeded through a three-\n                                           year litigation and culminated in a jury trial. The jury found in favor of the Bartolones, and the\n                                           Superior Court of Morgan County entered a Final Judgment and Decree establishing the\n                                           parties' common boundary line in accordance with the historic \"Dennis Huff line.\" Civil Action\n                                           No. 2009CA849. The Final Judgment further ordered that each party and their successors in\n                                           title enjoy full use of their respective properties without interference.\n                                           Mr. Bartolone also provided a subsequently recorded Property Line Affidavit confirming the jury\n                                           verdict and Final Judgment and Decree. According to the affidavit, Horse Branch Farms, LLC,\n                                           through F. Turner Kurzweg, Jr., originally filed suit in 2009 challenging the boundary line. The\n                                           affidavit was executed and recorded to memorialize the correct boundary for future title\n                                           examinations and to provide notice to successors in interest.\n\n                                           Mr. Bartolone advised that the current dispute does not concern ownership or an appeal of the\n                                           prior case. Rather, he contends that Horse Branch Farms, LLC and its principals, whom he\n                                           identified as Frank and Naomi Kurzweg (spelling confirmed), have recently constructed a fence\n                                           that encroaches over the court-established property line. He believes the encroachment is\n                                           clear and obvious and is supported by physical monuments, string-line measurements,\n                                           timestamped photographs, and other documentation. According to Mr. Bartolone, the fence\n                  Reason for Intake Call   crosses the previously adjudicated line despite the existence of the prior judgment and decree.\n\n                                           Mr. Bartolone states that he has represented himself throughout the matter and has\n                                           maintained extensive documentation consisting of several thousand pages. He has already\n                                           issued written demands requiring removal of the encroaching fence and has documented\n                                           service through certified mail, return receipts, and Sheriff's Office service. He advised that the\n                                           adverse parties have failed to comply. His objective is to enforce the existing judgment, compel\n                                           removal of the encroachment, and pursue attorney's fees and punitive damages based upon\n                                           what he characterizes as a knowing and willful violation of the court-ordered boundary.\n\n                                           Mr. Bartolone further advised that he contacted local code enforcement concerning additional\n                                           structures and improvements near the property line. According to him, code compliance\n                                           personnel determined that certain improvements, including a concrete monument, were in\n                                           violation and directed Horse Branch Farms to remove them. Mr. Bartolone indicated that his\n                                           primary concern remains the fence encroachment rather than the code issues.\n\n                                           Mr. Bartolone emphasized that the neighboring property owners possess substantial assets\n                                           and operate through Horse Branch Farms, LLC. He described the matter as involving\n                                           significant financial resources and believes the defendants' conduct is intentional. He advised\n                                           that he is interviewing three firms and is specifically seeking experienced real estate litigators.\n                                           He intends initially to provide a concise attorney-prepared summary and the prior court orders\n                                           before producing the remainder of his records for further review.\n\n\n                  Time Intake Completed    06/17/2026 11:29am EDT\n\n\n                                           No\n                                  PNC)\n\n                                           No\n                                  PNC)", "formUrl": "assets/Joe & Nancy Bartolone - Form Submission 06_17_2026 11_29am EDT - Intake Form.pdf", "docs": [{"name": "Letter to Kurzweg property encroachment 1090 Plainview rd 5-7-26.docx", "url": "assets/Letter to Kurzweg property encroachment 1090 Plainview rd 5-7-26.docx", "text": "\t\t\t\t\t\tMay 7, 2026\nFrom: \tJoseph Bartolone, Jr and\n\tNancy L. Bartolone\n\t1050 Plainview Road\n\tMadison, GA 30650\nTo: \tHorse Branch Farms, L.L.C.\n\tFrank/Naomi Kurzweg\t\n\t1100 Plainview Road\n\tMadison, GA 30650\nReference: Property Encroachment - 1090 Plainview Road (the Encroachment) \nAttention: Frank and Naomi Kurzweg\nThere is a common side property (boundary) line between the Bartolone property at 1090 Plainview Road, Madison Georgia and the Horse Branch Farms, L.L.C.  property, at 1100 Plainview Road, Madison Georgia.\nThis common property line has been determined by THE SUPERIOR COURT OF MORGAN COUNTY, STATE OF GEORGIA in Civil Action No. 2009CA849 to be “the Dennis Huff line”. \nSee attachment: FINAL JUDGEMENT AND DECREE ordered by THE SUPERIOR COURT MORGAN COUNTY, so ordered February 21, 2011. This line, “the Dennis Huff line” is clea led on February 24,"}]}, {"id": "mark-kamkariyan", "order": 3, "name": "Mark Kamkariyan", "submitted": "06/17/2026 12:13pm EDT", "completed": "06/17/2026 12:07pm EDT", "practice": "Debt Collection", "value": "", "adverse": "", "email": "", "phone": "678-822-7874", "summary": "failure to contribute to the business and her alleged theft of business assets prior to the lawsuit. He also notes that his first attorney's negligence played a significant role in the adverse outcome, which raises a potential malpractice issue worth discussing with the reviewing attorney. The current action being brought by Ayda is a collection effort stemming from that existing judgment. Mark notes that prior to the final judgment being entered, he sold two properties he owned. One of those properties had been placed in his wife's name from the time of purchase, and the second was transferred to his wife's name before the judgment was finalized. Ayda is now pursuing collection and appears to be targeting those property transactions as potentially fraudulent transfers, as well as going after a property Mark's wife purchased two years ago using her own funds with a 20% down payment. Mark emphasizes that his wife had no involvement in the original business dispute and that the property she purchased was acquired independently with her own money. Mark and his wife are currently in financial difficulty and are planning to sell their current home because they…", "fullText": "1 of 2\n\nIntake Form\nSubmitted on: 06/17/2026 12:13pm EDT • Form Type: Matter\n\n\n                                            Lead Type      Phone\n\n                                            First name     Mark\n\n                                            Last name      Kamkariyan\n\n                                    Phone (Primary)        678-822-7874\n\n                              Referral Source Type         Intake team\n\n                How did you find out about us?             GBP/GMB Google Business Profile\n\n                                        Practice Area      Debt Collection\n\n                                                           Mark Kamkariyan was served with legal papers today and is seeking representation in\n                                                           response to a collection action being brought against him by his former business partner, Ayda\n                                                           Khalegh, case number 26CV006816. The underlying dispute stems from a failed business\n                                                           partnership in which Mark and Ayda co-owned a small retail store of approximately 12,000\n                                                           square feet. The conflict originated when Mark discovered that Ayda had taken approximately\n                                                           $80,000 from the business without justification, and when he demanded repayment she\n                                                           allegedly emptied the store of all merchandise, drained the business bank accounts, and\n                                                           abandoned the operation entirely. The store sat vacant for six months, during which time the\n                                                           lease remained solely in Mark's name. To avoid being sued by the landlord, Mark reopened a\n                                                           business at the same location under a different name. Approximately two years later, Ayda\n                                                           returned and filed suit claiming the new business was a continuation of the original partnership.\n                                                           Mark's original attorney allegedly mishandled the case and a subsequent attorney was unable\n                                                           to repair the damage, resulting in Mark losing the case and oughout the entire facility due to\n                         safety concerns. Chanel estimates there is approximately $45,000 to $50,000 worth of\n                         equipment in the building that may be at risk.\n\n                         The financial impact of the delayed and defective construction extends beyond the build-out\n                         itself. Chanel previously operated a food truck business that generated approximately $1,100\n                         per day during operating hours. The food truck required a licensed commissary in order to be\n                         permitted, and the new restaurant space was intended to serve as that commissary. When\n                         Chanel lost access to the previous commissary space last July, she was forced to cease food\n                         truck operations entirely and accelerated the timeline for the build-out as a result. Ujamaa\n                         Construction was fully aware of this urgency and represented in documented meetings that\n                         timelines were on track and feasible. Due to the contractor's failure to deliver, Chanel has been\n                         unable to operate either her food truck or her brick and mortar restaurant, as the two\n                         businesses are entirely interdependent. The resulting loss of income has significantly affected\n                         her financial position over the course of the past year.\n\n                         Chanel has documented the situation thoroughly, including photographs of the poor\n                         workmanship, written complaints submitted to Ujamaa Construction on at least two to three\n                         occasions outlining areas of dissatisfaction, records of the days contractors were on site\n                         versus absent, and notes from meetings where the contractor confirmed the project was on\n                         schedule. She has not yet disclo <script>
let current=null;
const $=id=>document.getElementById(id);
function reviewedIds(){try{return JSON.parse(localStorage.getItem('reviewedIds')||'[]')}catch{return []}}
function markReviewed(id){const a=reviewedIds(); if(!a.includes(id)) a.push(id); localStorage.setItem('reviewedIds',JSON.stringify(a)); updateProgress(); return a.length>=CASES.length;}
function updateProgress(){const done=reviewedIds().length; const total=CASES.length; if($('progressPill')) $('progressPill').textContent = done+'/'+total+' reviewed' + (done===total?' • Queue Cleared 🎉':'');}

renderList();}

function openCase(id){current=CASES.find(c=>c.id===id);$('list').style.display='none';$('setup').classList.remove('active');$('detail').classList.add('active');const c=current;$('detail').innerHTML=`<button class="secondary back" onclick="showList()">← Back to Queue</button><section><h2>${c.name}</h2><div class="chips"><span class="chip value">${c.value||'No value listed'}</span><span class="chip">${c.practice||'No practice area'}</span><span class="chip docs">Docs: ${c.docs.length}</span></div><div class="kv"><b>Submitted</b><span>${c.submitted}</span><b>Completed</b><span>${c.completed||'—'}</span><b>Phone</b><span>${c.phone||'—'}</span><b>Email</b><span>${c.email||'—'}</span><b>Adverse</b><span>${c.adverse||'—'}</span></div></section><section><h3>Intake Summary</h3><div class="textblock">${escapeHtml(c.summary||'No summary found.')}</div></section><section><h3>Full Intake Form</h3><p><a class="btn secondary" href="${c.formUrl}" target="_blank">View Original Intake PDF</a></p><details><summary>Read extracted form text</summary><div class="textblock">${escapeHtml(c.fullText)}</div></details></section><section><h3>Supporting Docs</h3>${c.docs.length?c.docs.map(d=>`<details><summary>${escapeHtml(d.name)}</summary><p><a class="btn secondary" href="${d.url}" target="_blank">View Original Doc</a></p><div class="textblock">${escapeHtml(d.text||'No extractable text. Use original view.')}</div></details>`).join(''):'<p class="sub">No extra supporting docs attached.</p>'}</section><section><h3>Heather Review</h3><form id="reviewForm" onsubmit="submitReview(event)"><label>Quality Lead <span style="color:var(--danger)">*</span></label><div class="radio-row"><label><input type="radio" name="qualityLead" value="Yes" required>Yes</label><label><input type="radio" name="qualityLead" value="No">No</label><label><input type="radio" name="qualityLead" value="Maybe">Maybe</label></div><label>Consult Type</label><select name="consultType"><option value="">Select one</option><option>Complimentary</option><option>Paid</option><option>Decline</option><option>Refer Out</option><option>Needs More Info</option></select><label>Attorney Notes</label><textarea name="attorneyNotes" placeholder="Notes for Ari / Lawmatics..."></textarea><label>Minimum Retainer / Fee</label><input name="retainer" placeholder="$7,500 / $10,000 / hourly only / etc."><label>Documents Needed</label><textarea name="documentsNeeded" placeholder="Docs or follow-up info needed..."></textarea><div class="referral-wrap"><label class="toggle"><input type="checkbox" id="refToggle" onchange="toggleReferral()"> Referral in mind?</label><div id="refBox" class="referral-card hide"><label>Referral Notes</label><textarea id="referralNotes" name="referralNotes" placeholder="Referral attorney / firm / reason..."></textarea></div></div><input type="hidden" name="clientName" value="${escapeHtml(c.name)}"><button type="submit" style="width:100%;margin-top:14px">Submit Review</button><div id="status" class="status"></div></form></section>`; window.scrollTo(0,0)}
function toggleReferral(){const box=$('refBox');const toggle=$('refToggle');const notes=$('referralNotes');box.classList.toggle('hide',!toggle.checked);if(!toggle.checked&&notes){notes.value='';}}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
const DEFAULT_ENDPOINT='https://script.google.com/macros/s/AKfycbyuN-_mt09m-3rMNnlQU-rkCtoPod-HrWkfURN169pcA75UvFYnvalFn7nRnboAkUPV/exec';
function saveEndpoint(){localStorage.setItem('reviewEndpoint',$('endpoint').value.trim()); alert('Saved.')}
async function submitReview(e){
  e.preventDefault();
  const f=new FormData(e.target);
  const data=Object.fromEntries(f.entries());
  data.clientName=current.name;
  data.referralInMind=$('refToggle').checked?'Yes':'No';
  data.userAgent=navigator.userAgent;
  const ep=localStorage.getItem('reviewEndpoint')||DEFAULT_ENDPOINT||'';
  const all=JSON.parse(localStorage.getItem('localReviews')||'[]');
  all.push({timestamp:new Date().toISOString(),...data});
  localStorage.setItem('localReviews',JSON.stringify(all));
  const finish=()=>{const allDone=markReviewed(current.id); renderList(); celebrate(allDone);};
  if(!ep){$('status').textContent='Saved locally. Google Sheet connection did not respond.'; finish(); return;}
  try{
    await fetch(ep,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});
    $('status').textContent='Submitted to Google Sheet. Tiny gavel bang.';
    finish();
  }catch(err){
    $('status').textContent='Could not submit online, but saved locally. Error: '+err.message;
    finish();
  }
}
function celebrate(allDone){
  const overlay=$('celebration'), card=overlay.querySelector('.celebration-card');

  $('celebrationMsg').innerHTML = allDone
    ? 'Heather, you cleared the whole review queue!<br><br><b>Ari will update in Lawmatics for you.</b><br>Have a great day Heather :)'
    : 'One review down. Ari will take it from here. 💕';
  $('celebrationBtn').textContent = allDone ? 'Queue Defeated 💕' : 'Back to Queue';
  overlay.classList.remove('hidden');
  launchConfetti(allDone ? 140 : 45);
  if(!allDone){ setTimeout(closeCelebration, 4200); }
}
function closeCelebration(){
  $('celebration').classList.add('hidden');
  $('confettiLayer').innerHTML='';
  showList();
}
function launchConfetti(count){
  const layer=$('confettiLayer');
  layer.innerHTML='';
  const colors=['#b8326f','#ff9cc4','#ffd6e6','#fff2bf','#d85892','#f1e8ff'];
  for(let i=0;i<count;i++){
    const piece=document.createElement('span');
    piece.className='confetti';
    piece.style.left=Math.random()*100+'vw';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration=(2.1+Math.random()*2.9)+'s';
    piece.style.animationDelay=(Math.random()*0.5)+'s';
    piece.style.transform='rotate('+Math.random()*360+'deg)';
    layer.appendChild(piece);
  }
}
function exportLocal(){const data=localStorage.getItem('localReviews')||'[]'; const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='heather-review-local-export.json'; a.click(); URL.revokeObjectURL(url);}
if(!localStorage.getItem('reviewEndpoint')){ localStorage.setItem('reviewEndpoint', DEFAULT_ENDPOINT); }
if($('endpoint')) $('endpoint').value = localStorage.getItem('reviewEndpoint') || DEFAULT_ENDPOINT;
updateProgress();
renderList();
</script></body></html>
