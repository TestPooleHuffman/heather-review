<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Heather Review Queue</title><style>
:root{--bg:#fff5f8;--card:#fffafe;--ink:#2b1720;--muted:#7b5b68;--line:#f2c8d8;--line2:#f6dbe5;--accent:#b8326f;--accent-dark:#87244f;--accent2:#ffe2ed}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#ffe3ee 0,#fff5f8 34%,#fff 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);line-height:1.45}
.wrap{max-width:940px;margin:0 auto;padding:16px 14px 90px}header{position:sticky;top:0;z-index:20;background:rgba(255,245,248,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:16px 14px 12px;margin:0 -14px 14px;box-shadow:0 10px 30px rgba(184,50,111,.08)}
h1{font-size:25px;margin:0 0 4px}.sub{color:var(--muted);font-size:13px}.grid{display:grid;gap:12px}.case-card,section{background:rgba(255,250,254,.98);border:1px solid var(--line);border-radius:24px;padding:15px;box-shadow:0 10px 28px rgba(184,50,111,.08)}
.case-card{position:relative;overflow:hidden}.case-card:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,#ff9cc4,#b8326f,#ffd6e6)}.case-card h2{margin:3px 0 6px;font-size:19px}.meta{font-size:13px;color:var(--muted);display:grid;gap:2px}.meta b{color:#5b3343}
button,.btn{border:0;border-radius:999px;padding:12px 15px;font-weight:850;background:linear-gradient(135deg,var(--accent),#d85892);color:white;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;box-shadow:0 8px 18px rgba(184,50,111,.18)}button.secondary,.btn.secondary{background:#fff;color:var(--accent-dark);border:1px solid var(--line);box-shadow:none}.toolbar{display:flex;gap:8px;margin-top:10px;overflow:auto}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 0}.chip{font-size:12px;padding:6px 9px;border-radius:999px;background:var(--accent2);color:var(--accent-dark);font-weight:800;border:1px solid #f7bfd4}.chip.docs{background:#f1e8ff;color:#5f367f;border-color:#e1ccff}.chip.value{background:#ffeef5;color:#9a255b;border-color:#ffc5dc}.chip.red{background:#fff0c7;color:#7b5200;border-color:#ffd96a}
.detail{display:none}.detail.active{display:block}h2{font-size:22px;margin:0 0 8px}h3{margin:0 0 10px;font-size:17px;color:#6e1644}.kv{display:grid;grid-template-columns:115px 1fr;gap:8px;font-size:14px;border-top:1px solid var(--line2);padding-top:10px}.kv b{color:var(--muted)}
.textblock{white-space:pre-wrap;background:#fff;border:1px solid var(--line2);border-radius:18px;padding:13px;max-height:430px;overflow:auto;font-size:14px}details{border:1px solid var(--line2);border-radius:18px;padding:11px;margin:8px 0;background:#fff}summary{font-weight:900;cursor:pointer;color:#5d2440}
label{display:block;font-size:13px;font-weight:900;margin:12px 0 6px;color:#5d2440}textarea,input,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:18px;padding:13px;background:#fff;color:var(--ink)}textarea{min-height:118px}
.radio-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.radio-row label{margin:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:18px;padding:11px;background:#fff;font-size:14px}input[type=radio],input[type=checkbox]{width:auto;margin-right:6px}
.notice,.empty{background:#fff1f6;border:1px solid var(--line);padding:16px;border-radius:22px;color:#6e1644;text-align:center}.empty{padding:34px 18px}.status{font-size:14px;font-weight:800;color:var(--accent-dark);margin-top:10px}.toggle{display:flex;align-items:center;gap:10px}.toggle input{width:auto}.hide{display:none!important}.referral-card{margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff,#fff3f8)}
.progress-pill{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--accent-dark);font-size:12px;font-weight:900}.footer-actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(255,245,248,0),rgba(255,245,248,.98) 28%);padding:18px 0 4px;margin-bottom:-6px}.mini{font-size:12px;color:var(--muted)}
.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(43,23,32,.38);backdrop-filter:blur(7px)}.celebration.hidden{display:none}.celebration-card{width:min(520px,92vw);background:linear-gradient(180deg,#fffafe,#fff0f6);border:1px solid var(--line);border-radius:30px;padding:26px 20px;text-align:center;box-shadow:0 28px 80px rgba(184,50,111,.28);position:relative;overflow:hidden}.celebration-card:before{content:"";position:absolute;inset:0 0 auto 0;height:9px;background:linear-gradient(90deg,#ff9cc4,#b8326f,#ffd6e6,#ffb7d1)}.celebration-icon{font-size:48px}.confetti-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none}.confetti{position:absolute;top:-20px;width:9px;height:14px;border-radius:3px;animation:confettiFall linear forwards}@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:1}}
.drop{border:2px dashed #e6aac2;border-radius:22px;padding:22px;text-align:center;background:#fff7fb;color:#6e1644}.drop.drag{background:#ffe8f2;border-color:var(--accent)}.file-list{font-size:13px;color:var(--muted);margin-top:10px}
@media(max-width:560px){.wrap{padding:12px 10px 90px}header{margin:0 -10px 12px;padding:14px 10px 11px}h1{font-size:22px}.case-card,section{border-radius:22px}.radio-row{grid-template-columns:1fr}.kv{grid-template-columns:96px 1fr}.textblock{max-height:360px}.footer-actions button{width:100%;justify-content:center}}
</style></head>
<body><div class="wrap"><header><h1>Heather Review Queue</h1><div class="sub">Oldest first • mobile-friendly • pink because attorney review deserves a little mercy.</div><div id="progressPill" class="progress-pill">Loading reviews…</div><div class="toolbar"><button class="secondary" onclick="showList()">← Queue</button><button class="secondary" onclick="loadCases()">Refresh</button></div></header><div id="list" class="grid"></div><div id="detail" class="detail"></div></div>
<div id="celebration" class="celebration hidden"><div id="confettiLayer" class="confetti-layer"></div><div class="celebration-card"><div id="celebrationIcon" class="celebration-icon">🎉</div><h2 id="celebrationTitle">Nice work, Heather!</h2><p id="celebrationMsg">One review down. Ari will take it from here. 💕</p><button onclick="closeCelebration()">Back to Queue</button></div></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyuN-_mt09m-3rMNnlQU-rkCtoPod-HrWkfURN169pcA75UvFYnvalFn7nRnboAkUPV/exec";
let CASES=[], currentId=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const reviewedKey=id=>"heatherReviewed_"+id;
const locallyReviewed=id=>localStorage.getItem(reviewedKey(id))==="1";
async function api(action,payload={}){const res=await fetch(SCRIPT_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...payload})});return await res.json();}
async function loadCases(){$("progressPill").textContent="Refreshing…";try{const data=await api("listCases");CASES=(data.cases||[]).filter(c=>String(c.status||"Pending").toLowerCase()!=="reviewed").filter(c=>!locallyReviewed(c.id)).sort((a,b)=>new Date(a.submitted||a.completed||0)-new Date(b.submitted||b.completed||0));renderList();}catch(e){$("list").innerHTML=`<div class="notice"><b>Could not load from Google Sheet.</b><br>Check Apps Script deployment/permissions.</div>`;$("progressPill").textContent="Load error";}}
function showList(){currentId=null;$("detail").classList.remove("active");$("list").style.display="grid";renderList();}
function renderList(){let total=CASES.length;$("progressPill").textContent=total?`${total} pending review${total===1?"":"s"}`:"Queue cleared";if(!total){$("list").innerHTML=`<section class="empty"><div style="font-size:44px">🌷</div><h2>All clear, Heather!</h2><p>There are no pending attorney reviews right now.</p><p class="mini">Check back later if the intake team uploads any more. Ari will update Lawmatics for you. 💕</p></section>`;return;}$("list").innerHTML=CASES.map(c=>`<article class="case-card" onclick="openCase('${esc(c.id)}')"><h2>${esc(c.name)}</h2><div class="meta"><div><b>Submitted:</b> ${esc(c.submitted||c.completed||"")}</div><div><b>Practice:</b> ${esc(c.practice||"")}</div>${c.value?`<div><b>Value:</b> ${esc(c.value)}</div>`:""}</div><div class="chips">${c.value?`<span class="chip value">${esc(c.value)}</span>`:""}${(c.docs||[]).length?`<span class="chip docs">Docs: ${(c.docs||[]).length}</span>`:""}${(c.docs||[]).some(d=>/red flag/i.test(d.name||""))?`<span class="chip red">Red Flag Check</span>`:""}<span class="chip">Tap to review</span></div></article>`).join("");}
function openCase(id){let c=CASES.find(x=>x.id===id);if(!c)return;currentId=id;$("list").style.display="none";$("detail").classList.add("active");let docs=(c.docs||[]).map(d=>`<details><summary>${esc(d.name)}</summary><p><a class="btn secondary" href="${esc(d.url)}" target="_blank">View Original Doc</a></p>${d.text?`<div class="textblock">${esc(d.text)}</div>`:`<div class="notice">No extracted text available. Use “View Original Doc.”</div>`}</details>`).join("");$("detail").innerHTML=`<button class="secondary" onclick="showList()">← Back to Queue</button><section><h2>${esc(c.name)}</h2><div class="kv"><b>Practice</b><span>${esc(c.practice||"")}</span><b>Value</b><span>${esc(c.value||"")}</span><b>Adverse</b><span>${esc(c.adverse||"")}</span><b>Email</b><span>${esc(c.email||"")}</span><b>Phone</b><span>${esc(c.phone||"")}</span></div></section><section><h3>Attorney-Facing Summary</h3><div class="textblock">${esc(c.summary||"")}</div></section><section><h3>Full Intake Form Contents</h3><div class="textblock">${esc(c.fullText||"")}</div>${c.formUrl?`<p><a class="btn secondary" href="${esc(c.formUrl)}" target="_blank">View Original Intake Form</a></p>`:""}</section><section><h3>Supporting Docs ${(c.docs||[]).length?`(${(c.docs||[]).length})`:""}</h3>${docs||`<div class="notice">No supporting docs uploaded.</div>`}</section><section><h3>Heather's Review</h3><form id="reviewForm" onsubmit="submitReview(event)"><label>Quality Lead *</label><div class="radio-row"><label><input required type="radio" name="qualityLead" value="Yes"> Yes</label><label><input required type="radio" name="qualityLead" value="Maybe"> Maybe</label><label><input required type="radio" name="qualityLead" value="No"> No</label></div><label>Consult Type</label><select name="consultType"><option value="">Select one…</option><option>Complimentary</option><option>Paid</option><option>Decline</option><option>Refer Out</option><option>Needs More Info</option></select><label>Minimum Retainer / Fee</label><input name="minRetainer" placeholder="$10,000 / $500 paid consult / etc."><label>Documents Needed</label><textarea name="docsNeeded"></textarea><label>Attorney Notes</label><textarea name="attorneyNotes"></textarea><label class="toggle"><input type="checkbox" id="refToggle" onchange="toggleReferral()"> Referral in mind?</label><div id="refBox" class="referral-card hide"><label>Referral Notes</label><textarea id="referralNotes" name="referralNotes"></textarea></div><div class="footer-actions"><button type="submit">💕 Submit Review</button><div id="submitStatus" class="status"></div></div></form></section>`;window.scrollTo({top:0,behavior:"smooth"});}
function toggleReferral(){let box=$("refBox"),t=$("refToggle"),n=$("referralNotes");box.classList.toggle("hide",!t.checked);if(!t.checked&&n)n.value="";}
async function submitReview(e){e.preventDefault();let c=CASES.find(x=>x.id===currentId),f=new FormData(e.target),payload={caseId:c.id,clientName:c.name,qualityLead:f.get("qualityLead"),consultType:f.get("consultType"),minRetainer:f.get("minRetainer"),docsNeeded:f.get("docsNeeded"),attorneyNotes:f.get("attorneyNotes"),referralInMind:$("refToggle").checked?"Yes":"No",referralNotes:$("refToggle").checked?f.get("referralNotes"):""};$("submitStatus").textContent="Submitting…";try{await api("submitReview",payload);localStorage.setItem(reviewedKey(c.id),"1");CASES=CASES.filter(x=>x.id!==c.id);showCelebration(CASES.length===0);}catch(err){$("submitStatus").textContent="Submission failed. Screenshot this review and send it to Ari.";}}
function showCelebration(final=false){$("celebrationIcon").textContent=final?"✨🎊✨":"🎉";$("celebrationTitle").textContent=final?"Yay! All done!":"Nice work, Heather!";$("celebrationMsg").innerHTML=final?"Heather, you cleared the review queue!<br><br><b>Ari will update in Lawmatics for you.</b><br>Have a great day Heather :) 💕":"One review down. Ari will take it from here. 💕";$("celebration").classList.remove("hidden");fireConfetti(final?100:42);}
function closeCelebration(){$("celebration").classList.add("hidden");$("confettiLayer").innerHTML="";showList();}
function fireConfetti(count=42){let layer=$("confettiLayer");layer.innerHTML="";let colors=["#b8326f","#ff9cc4","#ffd6e6","#fff2bf","#8e44ad","#f7bfd4"];for(let i=0;i<count;i++){let p=document.createElement("span");p.className="confetti";p.style.left=Math.random()*100+"vw";p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDuration=(1.8+Math.random()*2.2)+"s";p.style.animationDelay=(Math.random()*.55)+"s";layer.appendChild(p);}}
loadCases();
</script></body></html>
